services:

  telemt:
  
    image: ghcr.io/telemt/telemt:latest
    build: .
    user: "root"
    container_name: telemt
    restart: unless-stopped
    
    environment:
      RUST_LOG: "info"
    
    working_dir: /etc/telemt
    volumes:
      - ./config.toml:/etc/telemt/config.toml:ro
    tmpfs:
      - /etc/telemt:rw,mode=1777,size=4m
    
    #ports:
    #  - "443:443/tcp"
    
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
    read_only: true
    network_mode: host
        
    ulimits:
      nofile:
        soft: 65536
        hard: 262144
